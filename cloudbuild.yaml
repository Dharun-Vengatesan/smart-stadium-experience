steps:
  # 1. Install Dependencies & Lint/Test Backend
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r backend/requirements.txt
        cd backend
        pytest tests/

  # 2. Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/stadium-api:$COMMIT_SHA', './backend']

  # 3. Push Backend Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stadium-api:$COMMIT_SHA']

  # 4. Deploy to Cloud Run (Backend)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy stadium-api \
          --image gcr.io/$PROJECT_ID/stadium-api:$COMMIT_SHA \
          --region us-central1 \
          --allow-unauthenticated \
          --platform managed

  # 5. Build Frontend React App
  - name: 'node:18'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm install
        npm run build

  # 6. Deploy to Firebase Hosting (Requires FIREBASE_TOKEN secret)
  - name: 'gcr.io/$PROJECT_ID/firebase'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        firebase deploy --only hosting --token $$FIREBASE_TOKEN
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
    env: 'FIREBASE_TOKEN'

options:
  machineType: 'E2_HIGHCPU_8' # Scale CI compute for fast builds
